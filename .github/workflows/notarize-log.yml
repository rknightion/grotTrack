name: Fetch Notarization Log

on:
  workflow_dispatch:
    inputs:
      submission_id:
        description: 'Notarization submission ID'
        required: true

jobs:
  fetch-log:
    runs-on: macos-latest
    steps:
      - name: Fetch notarization log
        run: |
          xcrun notarytool log "${{ inputs.submission_id }}" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.NOTARY_PASSWORD }}" \
            notarization-log.json

      - name: Upload log
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: notarization-log
          path: notarization-log.json
