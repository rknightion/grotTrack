name: CodeQL
on:
  push:
    branches: [main]
  schedule:
    - cron: '43 3 * * 3'
permissions: {}
jobs:
  codeql:
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    uses: rknightion/.github/.github/workflows/codeql.yml@f31690684f4292d1fe8e528618f7c8306fe27d9a # v1.3.1
    with:
      # Swift omitted: CodeQL Swift requires a real Xcode build that autobuild
      # can't perform headlessly here. JS/TS + actions cover the rest.
      languages: '[{"language":"javascript-typescript","build-mode":"none"},{"language":"actions","build-mode":"none"}]'