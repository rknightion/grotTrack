name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '43 3 * * 3'
permissions: {}
jobs:
  codeql:
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    uses: rknightion/.github/.github/workflows/codeql.yml@17626c13325fb83a09c6ace6db2d280d83bbd494 # main
    with:
      # Swift omitted: CodeQL Swift requires a real Xcode build that autobuild
      # can't perform headlessly here. JS/TS + actions cover the rest.
      languages: '[{"language":"javascript-typescript","build-mode":"none"},{"language":"actions","build-mode":"none"}]'
