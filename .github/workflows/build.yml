name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-swift:
    name: Build & Test macOS App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache Homebrew bottles
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-xcodegen-swiftlint-v1

      - name: Install tools
        run: brew install xcodegen swiftlint

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: |
            deriveddata-

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging
        continue-on-error: true

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -project GrotTrack.xcodeproj \
            -scheme GrotTrackTests \
            -destination 'platform=macOS' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test-without-building \
            -project GrotTrack.xcodeproj \
            -scheme GrotTrackTests \
            -destination 'platform=macOS' \
            -derivedDataPath ./build \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Coverage Summary
        if: always()
        run: |
          if [ -d TestResults.xcresult ]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json
            COVERAGE=$(python3 -c "
          import json, sys
          with open('coverage.json') as f:
              data = json.load(f)
          for target in data.get('targets', []):
              if 'GrotTrack' in target['name'] and '.app' in target['name']:
                  print(f\"{target['lineCoverage'] * 100:.1f}\")
                  sys.exit(0)
          print('N/A')
          ")
            echo "### Code Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          fi

      # PRs: upload unsigned test build (secrets not available from forks)
      - name: Upload macOS App (unsigned)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: GrotTrack-macOS-unsigned-${{ github.sha }}
          path: build/Build/Products/Debug/GrotTrack.app
          retention-days: 2

      # Main branch pushes: sign and upload
      - name: Import signing certificate
        if: github.event_name == 'push'
        uses: apple-actions/import-codesign-certs@fe74d46e82474f87e1ba79832ad28a4013d0e33a # v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Archive & sign
        if: github.event_name == 'push'
        run: |
          xcodebuild archive \
            -project GrotTrack.xcodeproj \
            -scheme GrotTrack \
            -archivePath ./archive/GrotTrack.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGNING_ALLOWED=YES

      - name: Package signed app
        if: github.event_name == 'push'
        run: |
          ditto -c -k --keepParent \
            archive/GrotTrack.xcarchive/Products/Applications/GrotTrack.app \
            GrotTrack-signed.zip

      - name: Upload macOS App (signed)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: GrotTrack-macOS-signed-${{ github.sha }}
          path: GrotTrack-signed.zip
          retention-days: 2

  build-extension:
    name: Build & Check Chrome Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: grot-track-extension
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: grot-track-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare WXT types
        run: npx wxt prepare

      - name: Type check
        run: npx tsc --noEmit

      - name: Build extension
        run: npx wxt build

      - name: Upload Chrome Extension
        uses: actions/upload-artifact@v4
        with:
          name: GrotTrack-Extension-${{ github.sha }}
          path: grot-track-extension/.output/chrome-mv3/
          retention-days: 2
