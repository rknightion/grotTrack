name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test-gate:
    name: Test Before Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache Homebrew bottles
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-xcodegen-v1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: |
            deriveddata-

      - name: Run Tests
        run: |
          xcodebuild test \
            -project GrotTrack.xcodeproj \
            -scheme GrotTrackTests \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

  build-release:
    name: Build Release Artifacts
    needs: [release-please, test-gate]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache Homebrew bottles
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-xcodegen-v1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: |
            deriveddata-

      - name: Build Release Archive
        run: |
          xcodebuild archive \
            -project GrotTrack.xcodeproj \
            -scheme GrotTrack \
            -archivePath build/GrotTrack.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Package App
        run: |
          cd build/GrotTrack.xcarchive/Products/Applications
          zip -r ../../../../GrotTrack-unsigned.zip GrotTrack.app

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: grot-track-extension/package-lock.json

      - name: Build Chrome Extension
        run: |
          cd grot-track-extension
          npm ci
          npx wxt zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            GrotTrack-unsigned.zip
            grot-track-extension/.output/*.zip
