name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read # workflow default; write scopes granted per-job below

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # release-please creates tags and GitHub releases
      pull-requests: write # release-please opens and updates the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          # PAT (not GITHUB_TOKEN): bot-authored release PRs need a non-default-token author for CI to run without manual approval
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  test-gate:
    name: Test Before Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache Homebrew bottles
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-xcodegen-v1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: |
            deriveddata-

      - name: Run Tests
        run: |
          xcodebuild test \
            -project GrotTrack.xcodeproj \
            -scheme GrotTrackTests \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

  build-release:
    name: Build Release Artifacts
    needs: [release-please, test-gate]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-26
    permissions:
      contents: write # softprops/action-gh-release uploads assets to the GitHub release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Cache Homebrew bottles
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-xcodegen-v1
          lookup-only: true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: |
            deriveddata-
          lookup-only: true

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build Release Archive
        run: |
          xcodebuild archive \
            -project GrotTrack.xcodeproj \
            -scheme GrotTrack \
            -archivePath build/GrotTrack.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Re-sign Sparkle framework binaries
        run: |
          APP="build/GrotTrack.xcarchive/Products/Applications/GrotTrack.app"
          SPARKLE="$APP/Contents/Frameworks/Sparkle.framework/Versions/B"
          IDENTITY="Developer ID Application"

          # Sign Sparkle's embedded components (innermost first)
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "$SPARKLE/XPCServices/Downloader.xpc"
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "$SPARKLE/XPCServices/Installer.xpc"
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "$SPARKLE/Autoupdate"
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "$SPARKLE/Updater.app"
          # Re-sign the framework itself
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" "$APP/Contents/Frameworks/Sparkle.framework"
          # Re-sign the main app (outermost last)
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" \
            --entitlements GrotTrack/GrotTrack.entitlements \
            "$APP"

          # Verify signatures
          codesign --verify --deep --strict "$APP"
          echo "All signatures valid"

      - name: Notarize App
        run: |
          ditto -c -k --keepParent \
            build/GrotTrack.xcarchive/Products/Applications/GrotTrack.app \
            GrotTrack-for-notary.zip
          xcrun notarytool submit GrotTrack-for-notary.zip \
            --apple-id ${{ secrets.APPLE_ID }} \
            --team-id ${{ secrets.APPLE_TEAM_ID }} \
            --password ${{ secrets.NOTARY_PASSWORD }} \
            --wait
          xcrun stapler staple \
            build/GrotTrack.xcarchive/Products/Applications/GrotTrack.app

      - name: Package App
        run: |
          ditto -c -k --keepParent \
            build/GrotTrack.xcarchive/Products/Applications/GrotTrack.app \
            GrotTrack.zip

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: false # zizmor: ignore[cache-poisoning] publishing job — poisoned cache could inject into release artifact
          cache-dependency-path: grot-track-extension/package-lock.json

      - name: Install icon dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Build Chrome Extension
        run: |
          cd grot-track-extension
          npm ci
          npx wxt zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2 # zizmor: ignore[superfluous-actions] softprops provides richer asset-upload API than gh release (multi-glob, existing release update)
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            GrotTrack.zip
            grot-track-extension/.output/*.zip

  update-appcast:
    name: Update Appcast Feed
    needs: [release-please, build-release]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release download "${NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME}" \
            --pattern "GrotTrack.zip" --dir .

      - name: Install Sparkle tools
        run: |
          SPARKLE_VERSION="2.6.4"
          curl -L -o Sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir sparkle-tools
          tar xf Sparkle.tar.xz -C sparkle-tools

      - name: Verify Sparkle tools
        run: |
          # shellcheck disable=SC2015  # best-effort verification; step must never fail
          ls sparkle-tools/bin/sign_update && ./sparkle-tools/bin/sign_update --help || true

      - name: Sign update with EdDSA
        id: sign
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          SIGN_OUTPUT=$(echo "$SPARKLE_EDDSA_KEY" | ./sparkle-tools/bin/sign_update GrotTrack.zip -f -)
          # sign_update outputs: sparkle:edSignature="<sig>" length="<len>"
          SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          LENGTH=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "::error::Failed to parse signature or length from sign_update output"
            echo "sign_update output was: $SIGN_OUTPUT"
            exit 1
          fi
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Generate appcast entry
        run: |
          VERSION="${NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME}"
          VERSION="${VERSION#v}"  # strip leading 'v'
          mkdir -p _site
          # Restore previous appcast if it exists
          curl -fsSL "https://rknightion.github.io/grotTrack/appcast.xml" -o _site/appcast.xml 2>/dev/null || true
          cd _site
          ../scripts/update-appcast.sh \
            "$VERSION" \
            "${STEPS_SIGN_OUTPUTS_SIGNATURE}" \
            "${STEPS_SIGN_OUTPUTS_LENGTH}"
        env:
          NEEDS_RELEASE_PLEASE_OUTPUTS_TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          STEPS_SIGN_OUTPUTS_SIGNATURE: ${{ steps.sign.outputs.signature }}
          STEPS_SIGN_OUTPUTS_LENGTH: ${{ steps.sign.outputs.length }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  publish-extension:
    name: Publish Chrome Extension
    needs: [release-please, build-release]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: grot-track-extension/package-lock.json

      - name: Install icon dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Build extension zip
        working-directory: grot-track-extension
        run: |
          npm ci
          npx wxt zip

      - name: Upload to Chrome Web Store
        working-directory: grot-track-extension
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx chrome-webstore-upload-cli@3 upload \
            --source .output/*.zip \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"

      - name: Publish on Chrome Web Store
        working-directory: grot-track-extension
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx chrome-webstore-upload-cli@3 publish \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN"
