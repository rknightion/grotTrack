name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test-gate:
    name: Test Before Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache Homebrew bottles
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-xcodegen-v1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: |
            deriveddata-

      - name: Run Tests
        run: |
          xcodebuild test \
            -project GrotTrack.xcodeproj \
            -scheme GrotTrackTests \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

  build-release:
    name: Build Release Artifacts
    needs: [release-please, test-gate]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache Homebrew bottles
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-xcodegen-v1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('**/*.swift', 'project.yml') }}
          restore-keys: |
            deriveddata-

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@fe74d46e82474f87e1ba79832ad28a4013d0e33a # v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build Release Archive
        run: |
          xcodebuild archive \
            -project GrotTrack.xcodeproj \
            -scheme GrotTrack \
            -archivePath build/GrotTrack.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGNING_ALLOWED=YES

      - name: Notarize App
        run: |
          ditto -c -k --keepParent \
            build/GrotTrack.xcarchive/Products/Applications/GrotTrack.app \
            GrotTrack-for-notary.zip
          xcrun notarytool submit GrotTrack-for-notary.zip \
            --apple-id ${{ secrets.APPLE_ID }} \
            --team-id ${{ secrets.APPLE_TEAM_ID }} \
            --password ${{ secrets.NOTARY_PASSWORD }} \
            --wait
          xcrun stapler staple \
            build/GrotTrack.xcarchive/Products/Applications/GrotTrack.app

      - name: Package App
        run: |
          ditto -c -k --keepParent \
            build/GrotTrack.xcarchive/Products/Applications/GrotTrack.app \
            GrotTrack.zip

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: grot-track-extension/package-lock.json

      - name: Build Chrome Extension
        run: |
          cd grot-track-extension
          npm ci
          npx wxt zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            GrotTrack.zip
            grot-track-extension/.output/*.zip
